<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entraîneur Maths 🧮</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        
        .header {
            margin-bottom: 30px;
        }
        
        .title {
            font-size: 2.5em;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .level-display {
            font-size: 1.2em;
            color: #764ba2;
            margin-bottom: 15px;
        }
        
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .score {
            font-size: 1em;
            color: #666;
            margin-bottom: 20px;
        }
        
        .question {
            font-size: 2em;
            color: #333;
            margin: 30px 0;
            font-weight: bold;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        input[type="number"] {
            flex: 1;
            padding: 15px;
            font-size: 1.2em;
            border: 3px solid #667eea;
            border-radius: 10px;
            text-align: center;
        }
        
        input[type="number"]:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 10px rgba(118, 75, 162, 0.3);
        }
        
        button {
            padding: 15px 30px;
            font-size: 1.1em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .feedback {
            font-size: 1.5em;
            margin: 20px 0;
            min-height: 40px;
            font-weight: bold;
        }
        
        .feedback.correct {
            color: #4caf50;
        }
        
        .feedback.incorrect {
            color: #f44336;
        }
        
        .emoji-celebration {
            font-size: 3em;
            animation: bounce 0.6s ease-in-out;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .difficulty-info {
            font-size: 0.9em;
            color: #999;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        
        .level-badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            margin-left: 10px;
        }
        
        .restart-btn {
            background: #f44336;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">🧮 Entraîneur Maths</div>
            <div class="level-display">
                Niveau <span id="level">1</span>
                <span class="level-badge" id="difficulty"></span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="score">
                ✅ Bonnes réponses: <strong id="correct">0</strong> | 
                ❌ Erreurs: <strong id="errors">0</strong>
            </div>
        </div>
        
        <div class="question" id="question">12 + 5 = ?</div>
        
        <div class="input-group">
            <input type="number" id="answer" placeholder="Réponse" autofocus>
            <button onclick="checkAnswer()">Vérifier</button>
        </div>
        
        <div class="feedback" id="feedback"></div>
        
        <div class="difficulty-info">
            <p id="difficultyText">Commence par des calculs faciles! 😊</p>
        </div>
        
        <button class="restart-btn" onclick="restartGame()">Recommencer</button>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
